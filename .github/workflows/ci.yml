name: CI/CD Safety

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Install Client & Server Dependencies
        run: npm run install-all

      - name: Verify Client Build
        run: npm run build
        env:
          VITE_API_URL: https://dummy-api.com

      - name: Lint Server (Optional)
        run: |
          cd server
          # If you add eslint, run: npx eslint .
          cd ..

      - name: CI Success
        run: echo "Reliability checks passed!"
